<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Colage Poster — Campus</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 11in;
    height: 17in;
    background: #0A0A0A;
    font-family: 'Inter', -apple-system, sans-serif;
    color: white;
    overflow: hidden;
    position: relative;
  }

  /* Background gradient blobs */
  .blob-1 {
    position: absolute;
    top: 10%;
    left: -10%;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: rgba(108, 92, 231, 0.25);
    filter: blur(120px);
  }
  .blob-2 {
    position: absolute;
    bottom: 15%;
    right: -5%;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: rgba(0, 206, 201, 0.15);
    filter: blur(100px);
  }
  .blob-3 {
    position: absolute;
    top: 50%;
    left: 40%;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: rgba(162, 155, 254, 0.1);
    filter: blur(80px);
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 60px;
    text-align: center;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
  }
  .logo-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, #6C5CE7, #A29BFE);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 900;
    color: white;
  }
  .logo-text {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -1px;
  }

  .headline {
    font-size: 140px;
    font-weight: 900;
    line-height: 0.9;
    margin-bottom: 30px;
    letter-spacing: -4px;
  }
  .headline .be { color: white; }
  .headline .you {
    background: linear-gradient(135deg, #6C5CE7, #A29BFE, #00CEC9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 28px;
    color: #A0A0A0;
    max-width: 500px;
    line-height: 1.5;
    margin-bottom: 50px;
    font-weight: 400;
  }

  .features {
    display: flex;
    gap: 30px;
    margin-bottom: 50px;
  }
  .feature {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 24px;
    border-radius: 50px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 16px;
    font-weight: 600;
    color: #A0A0A0;
  }
  .feature .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00E676;
  }

  .phone-mockup {
    width: 260px;
    height: 520px;
    border-radius: 40px;
    background: #1A1A1A;
    border: 2px solid rgba(255,255,255,0.1);
    margin-bottom: 50px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 60px rgba(108,92,231,0.2);
  }
  .phone-notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 28px;
    background: #0A0A0A;
    border-radius: 0 0 16px 16px;
    z-index: 5;
  }
  .phone-screen {
    padding: 40px 20px 20px;
    height: 100%;
    background: linear-gradient(to bottom, #00274C, #0A0A0A);
    position: relative;
  }
  .phone-header {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 8px;
  }
  .phone-subheader {
    font-size: 8px;
    color: rgba(255,203,5,0.6);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .phone-subheader .online-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #00E676;
  }

  /* Student dots on phone */
  .student-dot {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #FFCB05;
    border: 2px solid #0A0A0A;
  }
  .student-dot.you {
    background: #00E676;
    width: 14px;
    height: 14px;
  }

  .mode-switcher {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 2px;
    background: rgba(0,0,0,0.6);
    border-radius: 50px;
    padding: 3px;
  }
  .mode-switcher span {
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 9px;
    font-weight: 700;
    color: rgba(255,255,255,0.3);
  }
  .mode-switcher span.active {
    background: #6C5CE7;
    color: white;
  }

  .qr-section {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 20px 32px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .qr-box {
    width: 80px;
    height: 80px;
    background: white;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #0A0A0A;
    font-weight: 700;
    text-align: center;
    line-height: 1.2;
  }
  .qr-text {
    text-align: left;
  }
  .qr-text .big {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .qr-text .small {
    font-size: 14px;
    color: #A0A0A0;
  }

  .bottom-bar {
    position: absolute;
    bottom: 30px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 16px;
    color: #666;
  }
  .bottom-bar span {
    color: #A29BFE;
  }
</style>
</head>
<body>
  <div class="blob-1"></div>
  <div class="blob-2"></div>
  <div class="blob-3"></div>

  <div class="content">
    <div class="logo">
      <div class="logo-icon">C</div>
      <div class="logo-text">colage</div>
    </div>

    <div class="headline">
      <div class="be">Be</div>
      <div class="you">You.</div>
    </div>

    <div class="subtitle">
      Discover who's around you on campus. Connect through social links. No DMs. No pressure.
    </div>

    <div class="features">
      <div class="feature"><div class="dot"></div> Verified .edu students only</div>
      <div class="feature">🗺️ Map · List · AR</div>
      <div class="feature">🔒 No in-app messaging</div>
    </div>

    <div class="phone-mockup">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <div class="phone-header">University of Michigan</div>
        <div class="phone-subheader"><span class="online-dot"></span> 847 students nearby</div>
        <div class="student-dot" style="top: 30%; left: 25%;"></div>
        <div class="student-dot" style="top: 45%; left: 60%;"></div>
        <div class="student-dot" style="top: 55%; left: 30%;"></div>
        <div class="student-dot you" style="top: 42%; left: 45%;"></div>
        <div class="student-dot" style="top: 35%; left: 70%;"></div>
        <div class="student-dot" style="top: 65%; left: 55%;"></div>
        <div class="student-dot" style="top: 25%; left: 50%;"></div>
        <div class="student-dot" style="top: 60%; left: 20%;"></div>
        <div class="mode-switcher">
          <span class="active">Map</span>
          <span>List</span>
          <span>AR</span>
        </div>
      </div>
    </div>

    <div class="qr-section">
      <div class="qr-box">QR<br>CODE</div>
      <div class="qr-text">
        <div class="big">Download Free</div>
        <div class="small">colageclub.com</div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">Available on <span>iOS</span> & <span>Android</span></div>
</body>
</html>
