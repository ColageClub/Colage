name: Colage
options:
  bundleIdPrefix: com.colage
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  developmentLanguage: en

packages:
  MapboxMaps:
    url: https://github.com/mapbox/mapbox-maps-ios.git
    from: "11.0.0"

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  Colage:
    type: application
    platform: iOS
    sources:
      - path: Colage
        excludes:
          - "**/*.xcassets"
      - path: Colage/Resources/Assets.xcassets
        type: folder
    settings:
      base:
        INFOPLIST_FILE: Colage/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.colage.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Colage uses your location to show you on the campus map and help you discover nearby students."
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Colage uses your location to show you on the campus map even when the app is in the background."
        INFOPLIST_KEY_NSCameraUsageDescription: "Colage uses your camera for AR discovery mode and profile photos."
    dependencies:
      - package: MapboxMaps

  ColageTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ColageTests
    dependencies:
      - target: Colage
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
