version: 1
applications:
  - appRoot: website
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - env | grep -E '^(STRIPE_|NEXT_PUBLIC_|MAPBOX_|API_URL)' >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
