name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  website:
    name: Website Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lint Lambda functions
        run: |
          # Check all Lambda handlers parse without syntax errors
          for f in infra/functions/*/index.mjs; do
            echo "Checking $f..."
            node --check "$f" || exit 1
          done
          echo "All Lambda functions pass syntax check"
